name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest

      - name: Import smoke
        run: python -c "from app.api.main import app; print(app.title)"

      - name: Wheel build
        run: python -m pip wheel . --no-deps --wheel-dir dist

      - name: Docker build
        run: docker build -t manager-bot-ci .
